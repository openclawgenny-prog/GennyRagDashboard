version: '3.8'

services:
  db:
    image: ghcr.io/openclawgenny-prog/postgres-pgvector:15
    environment:
      POSTGRES_USER: "andrei"
      POSTGRES_PASSWORD: "PostgressGreenCat1!"
      POSTGRES_DB: "vectordb"
    volumes:
      - /mnt/data_disk/data/postgres:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres} -h localhost || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
